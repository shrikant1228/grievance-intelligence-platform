<!DOCTYPE html>
<html>
<head>
    <title>Simple Image Upload Test</title>
</head>
<body>
    <h2>Simple Image Upload Test</h2>
    
    <form action="http://localhost:8000/api/complaints-with-image" method="post" enctype="multipart/form-data">
        <div>
            <label>Complaint Text:</label><br>
            <textarea name="text" rows="4" cols="50">Deep pothole on MG Road</textarea>
        </div>
        <br>
        <div>
            <label>Location:</label><br>
            <input type="text" name="location" value="MG Road">
        </div>
        <br>
        <div>
            <label>Name:</label><br>
            <input type="text" name="name" value="Ramesh">
        </div>
        <br>
        <div>
            <label>Image:</label><br>
            <input type="file" name="image" accept="image/*">
        </div>
        <br>
        <div>
            <input type="submit" value="Submit">
        </div>
    </form>
    
    <p>After submitting, you'll see the JSON response on a new page.</p>
</body>
</html>
